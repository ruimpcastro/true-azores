<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<script src="https://kit.fontawesome.com/2d5ed696bf.js" crossorigin="anonymous"></script>
		%sveltekit.head%
	</head>

	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>

		<script>
			document.addEventListener('DOMContentLoaded', function () {
				const elements = document.body.querySelectorAll('*');

				elements.forEach(function (element, index) {
					if (element.classList.contains('fab-button') || element.classList.contains('fab-icon')) {
						element.classList.add('animate-fab');
						element.style.animationDelay = '1s'; // Apply a small, fixed delay

						return; // Skip the generic logic for the FAB
					}

					const delay = index > 5 ? 5 : index;
					element.style.animationDelay = delay * 0.05 + 's';
					element.classList.add('animate-async-reveal');
				});
			});
		</script>
	</body>
</html>
